<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Viajes - Bolivia</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="https://kit.fontawesome.com/62ea397d3a.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="site-header">
        <div class="nav-list">
            <div class="nav-row">
                <div class="logo">
                    <img class="logoImagen" src="img/logo.png" alt="logotipo de Boliviajes">
                    <img class="logoLetra" src="img/letra.png" alt="letra logo">
                </div>
                <nav id="nav" class="navegacion-principal">
                    <a href="index.html">Inicio</a>
                    <a href="nosotros.html">Nosotros</a>
                </nav>
            </div>
            <div class="nav-row">
                <label for="departamentos">Departamentos:</label>
                <select name="departamentos" id="departamentos" onchange="redirectTo(this.value)">
                    <option value="">Selecciona un Departamento</option>
                    <option value="SantaCruz.html">Santa Cruz</option>
                    <option value="Cochabamba.html">Cochabamba</option>
                    <option value="LaPaz.html">La Paz</option>
                    <option value="Oruro.html">Oruro</option>
                    <option value="Potosi.html">Potosi</option>
                    <option value="Tarija.html">Tarija</option>
                    <option value="Beni.html">Beni</option>
                    <option value="Pando.html">Pando</option>
                    <option value="Chuquisaca.html">Chuquisaca</option>
                </select>
            </div>
        </div>
    </header>

    <main>
            <section class="hero-container">
        <div class="carousel">
            <div class="carousel-item" style="background-image: url('https://ecommerceapi.assistcard.com/Api/ImagesHandler/GetImage?freeImageCode=boliviauy1');"></div>
            <div class="carousel-item" style="background-image: url('https://unifranz.edu.bo/wp-content/uploads/2024/01/pink-flamingoes-in-bolivia-2021-08-26-22-29-43-utc-medium-1250-834.jpg');"></div>
            <div class="carousel-item" style="background-image: url('imagen3.jpg');"></div>
        </div>
        <div class="hero-content">
            <h1>Bienvenido al Blog de Viajes más grande de <span>Bolivia</span></h1>
        </div>
        </section>

    </main>

    <footer class="footer-sitio">
        <p class="copyright">BlogdeViajes - Todos los derechos Reservados 2026 &copy;</p>
    </footer>

    <script>
        // hace que el value funcione como un enlace a la página correspondiente
        function redirectTo(url) {
            if (url) {
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
